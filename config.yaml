# Configuración del Pipeline ETL
pipeline:
  nombre: "ETL_Consolidacion_Metricas"
  version: "1.0.0"
  autor: "SistemaIndicadoresKPI"

rutas:
  input:      "./data/input"
  input_secundario: "./data/input_secundario"
  processing: "./data/processing"
  output:     "./data/output"
  output_secundario: "./data/output_secundario"
  archive:    "./data/archive"
  logs:       "./data/logs"
  error:      "./data/error"
  plantillas: "./data/plantillas"

consolidacion_excel:
  keyword_elearning: "elearning"
  keyword_files_jmc: "filesjmc"
  keyword_participantes: "participantes"
  keyword_plantilla: "calculo horas 2026"
  hoja_destino: "CONSOLIDADO"

proceso_secundario:
  habilitado: true
  keyword_archivo_destino: "horas entrenamiento 2026"
  hoja_destino: "Reporte horas"

archivos_esperados:
  - nombre: "source_A.xlsx"
    columnas_requeridas:
      - "ID_Operacion"
      - "Fecha"
      - "Unidad"
      - "Valor_Real"
      - "Responsable"
  - nombre: "source_B.xlsx"
    columnas_requeridas:
      - "ID_Operacion"
      - "Periodo"
      - "Valor_Meta"
      - "Categoria"
      - "Estado"

join:
  llave_primaria: "ID_Operacion"
  tipo: "left"

metricas:
  cumplimiento_optimo: 90
  cumplimiento_en_riesgo: 70

monitoreo:
  intervalo_segundos: 60
  notificacion_email: "equipo@empresa.com"